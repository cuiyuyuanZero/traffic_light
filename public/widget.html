<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信号灯桌面组件 (Traffic Light Widget)</title>
  <!-- Google Fonts Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="widget-body">

  <!-- Compact Frameless Widget -->
  <main class="traffic-light-widget" id="desktop-widget">
    <!-- Mini Controls (No-Drag area) -->
    <div class="widget-controls">
      <div class="drag-handle" title="按住拖拽移动位置">⋮⋮</div>
      <button class="widget-close-btn" id="btn-close-app" title="彻底退出应用">✕</button>
    </div>

    <!-- 3D Traffic Light Frame -->
    <div class="traffic-light-frame">
      <!-- RED: Thinking (glow indicates active state) -->
      <div class="light-hole">
        <div class="light red" id="codex-light-red">
          <span class="light-label">THINKING</span>
        </div>
        <span class="light-counter" id="codex-counter-red">0</span>
      </div>
      <!-- ORANGE: Executing -->
      <div class="light-hole">
        <div class="light orange" id="codex-light-orange">
          <span class="light-label">EXECUTING</span>
        </div>
        <span class="light-counter" id="codex-counter-orange">0</span>
      </div>
      <!-- GREEN: Finished -->
      <div class="light-hole">
        <div class="light green active" id="codex-light-green">
          <span class="light-label">FINISHED</span>
        </div>
        <span class="light-counter" id="codex-counter-green">0</span>
      </div>
    </div>
    
    <!-- Mini State Tag -->
    <div class="widget-tag green-glow" id="widget-state-tag">
      CODEX IDLE
    </div>
  </main>

  <!-- Connect to same backend and synchronize -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${wsProtocol}//${window.location.host}`;
      let ws = null;
      let currentScale = 1.0; // Local scale factor tracker
      
      const redLight = document.getElementById('codex-light-red');
      const orangeLight = document.getElementById('codex-light-orange');
      const greenLight = document.getElementById('codex-light-green');
      const stateTag = document.getElementById('widget-state-tag');
      const btnCloseApp = document.getElementById('btn-close-app');
      const trafficLightFrame = document.querySelector('.traffic-light-frame');
      const displayState = { state: 'finished', activeSince: 0, timer: null };
      const GREEN_DELAY_MS = 350;
      const MIN_ACTIVE_MS = 600;

      // Quit application
      btnCloseApp.addEventListener('click', () => {
        if (confirm('确定要退出红绿灯状态监控吗？')) {
          fetch('/api/quit', { method: 'POST' }).catch(() => {});
        }
      });

      function updateScaleOnServer(newScale) {
        newScale = Math.max(0.4, Math.min(2.0, newScale));
        currentScale = newScale;
        document.documentElement.style.setProperty('--widget-scale', newScale);
        
        console.log(`[Widget] Syncing scale to server: ${newScale}`);
        
        // POST to config endpoint to trigger Electron window bounds resize and WebSocket broadcasts
        fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scale: newScale })
        }).catch(err => {
          console.error('Failed to sync widget scale factor:', err);
        });
      }

      // Smooth zooming via Mouse Wheel
      let wheelTimeout = null;
      
      // Initialize currentScale from root styles if possible
      const rootStyles = getComputedStyle(document.documentElement);
      const initialScale = parseFloat(rootStyles.getPropertyValue('--widget-scale')) || 1.0;
      currentScale = initialScale;

      window.addEventListener('wheel', (e) => {
        // Only trigger if no modifiers are held to avoid conflicts
        if (e.ctrlKey || e.metaKey) return;
        
        e.preventDefault();
        
        // Use a standard delta step
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        let nextScale = currentScale + delta;
        
        nextScale = Math.round(Math.max(0.4, Math.min(2.0, nextScale)) * 10) / 10;
        
        if (nextScale !== currentScale) {
          console.log(`[Widget] Zooming to: ${nextScale}`);
          currentScale = nextScale;
          document.documentElement.style.setProperty('--widget-scale', currentScale);
          
          // Debounce the server sync to avoid flooding IPC/network
          clearTimeout(wheelTimeout);
          wheelTimeout = setTimeout(() => {
            updateScaleOnServer(currentScale);
          }, 150);
        }
      }, { passive: false });

      function updateLights(data) {
        const state = typeof data === 'string' ? data : data.state;
        const counts = typeof data === 'string' ? null : (data.counts || null);

        redLight.classList.remove('active', 'error', 'offline');
        orangeLight.classList.remove('active', 'offline');
        greenLight.classList.remove('active', 'offline');
        
        stateTag.classList.remove('red-glow', 'orange-glow', 'green-glow', 'offline-glow');

        // Counters
        const redCounter = document.getElementById('codex-counter-red');
        const orangeCounter = document.getElementById('codex-counter-orange');
        const greenCounter = document.getElementById('codex-counter-green');

        const updateCounter = (el, count) => {
          if (!el) return;
          el.textContent = count || 0;
          // ONLY SHOW IF COUNT > 1 as requested
          if (count > 1) el.classList.add('visible');
          else el.classList.remove('visible');
        };

        if (counts) {
          updateCounter(redCounter, (counts.error || 0) + (counts.thinking || 0));
          updateCounter(orangeCounter, counts.executing || 0);
          // NEVER show counter on green light for a clean idle state
          updateCounter(greenCounter, 0);
        }

        if (state === 'error') {
          redLight.classList.add('active', 'error');
          stateTag.textContent = 'CODEX ATTENTION';
          stateTag.className = 'widget-tag red-glow';
        } else if (state === 'offline') {
          redLight.classList.add('offline');
          orangeLight.classList.add('offline');
          greenLight.classList.add('offline');
          stateTag.textContent = 'CODEX OFFLINE';
          stateTag.className = 'widget-tag';
        } else if (state === 'thinking') {
          redLight.classList.add('active');
          stateTag.textContent = 'CODEX THINK';
          stateTag.className = 'widget-tag red-glow';
        } else if (state === 'executing') {
          orangeLight.classList.add('active');
          stateTag.textContent = 'CODEX EXEC';
          stateTag.className = 'widget-tag orange-glow';
        } else {
          greenLight.classList.add('active');
          stateTag.textContent = 'CODEX IDLE';
          stateTag.className = 'widget-tag green-glow';
        }
      }

      function scheduleLights(data, immediate = false) {
        const nextState = typeof data === 'string' ? data : data.state;
        if (displayState.timer) {
          clearTimeout(displayState.timer);
          displayState.timer = null;
        }

        const apply = () => {
          const previousState = displayState.state;
          displayState.state = nextState;
          if (nextState !== 'finished' && nextState !== 'offline') {
            displayState.activeSince = Date.now();
          } else if (previousState !== nextState) {
            displayState.activeSince = 0;
          }
          updateLights(data);
        };

        if (immediate || nextState === 'error' || nextState === 'thinking' || nextState === 'executing' || nextState === 'offline') {
          apply();
          return;
        }

        const activeElapsed = displayState.activeSince ? Date.now() - displayState.activeSince : MIN_ACTIVE_MS;
        const delay = Math.max(GREEN_DELAY_MS, MIN_ACTIVE_MS - activeElapsed, 0);
        displayState.timer = setTimeout(apply, delay);
      }

      function connect() {
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
          console.log('Widget connected to server');
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'status') {
              scheduleLights(msg.data.codex, true);
              // Ensure initial scale from config is applied immediately
              if (msg.config && msg.config.scale) {
                currentScale = parseFloat(msg.config.scale) || 1.0;
                document.documentElement.style.setProperty('--widget-scale', currentScale);
                console.log(`[Widget] Applied initial scale from status: ${currentScale}`);
              }
            } else if (msg.type === 'config') {
              if (msg.data && msg.data.scale) {
                currentScale = parseFloat(msg.data.scale) || 1.0;
                document.documentElement.style.setProperty('--widget-scale', currentScale);
              }
            } else if (msg.type === 'event' && msg.data.agent === 'codex') {
              scheduleLights(msg.data);
            }
          } catch(e) {
            console.error(e);
          }
        };

        ws.onclose = () => {
          setTimeout(connect, 3000);
        };
      }

      connect();

      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
          fetch('/api/refresh-status', { method: 'POST' }).catch(() => {});
        }
      });
      window.addEventListener('focus', () => {
        fetch('/api/refresh-status', { method: 'POST' }).catch(() => {});
      });
    });
  </script>
</body>
</html>
